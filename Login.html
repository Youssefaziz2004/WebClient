<!-- LOGIN -->
<section id="login">
  <h2>Login</h2>

  <input id="email" placeholder="Email"><br><br>
  <button onclick="login()">Login</button>

  <p>Don't have account? <span onclick="showPage('register')" style="color:blue;cursor:pointer;">Register</span></p>
  <script>
  function login(){
  let email = document.getElementById("email").value;

  if(email == ""){
    alert("enter email");
    return;
  }

  localStorage.setItem("user", email);
  alert("logged in");

  showPage("profile");
}
</script>
</section>
