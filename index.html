<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SLIDESHOW SCRIPT -->
<script>
let slides = [
  "Drivex.jpg",
  "Drivex2.jpg",
  "Drivex3.jpg",
  "Drivex4.jpg"
];

let index = 0;

setInterval(function(){
  index++;

  if(index >= slides.length){
    index = 0;
  }

  document.getElementById("slideImg").src = slides[index];

}, 3000);
</script>
