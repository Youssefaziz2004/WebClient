<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - DriveX</title>

  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">

    <!-- brand -->
    <a class="navbar-brand" href="#">DriveX</a>

    <!-- toggle button (mobile) -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- links -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link active" href="index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="product-details.html">Products</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="cart.html">Cart</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="login.html">Login</a>
        </li>

      </ul>
    </div>
</nav>

<div class="container mt-4">

  <h2>Checkout</h2>

  <div class="row">

    <!-- LEFT: FORM -->
    <div class="col-md-6">

      <h4>Billing Info</h4>

      <form onsubmit="return placeOrder()">

        <!-- name -->
        <input id="name" class="form-control mb-2" placeholder="Full Name">

        <!-- address -->
        <input id="address" class="form-control mb-2" placeholder="Address">

        <!-- payment -->
        <select id="payment" class="form-control mb-3">
          <option value="">Select Payment Method</option>
          <option>Cash</option>
          <option>Credit Card</option>
          <option>Debit</option>
        </select>

        <button class="btn btn-success w-100">
          Place Order
        </button>

      </form>

    </div>

    <!-- RIGHT: ORDER SUMMARY -->
    <div class="col-md-6">

      <h4>Order Summary</h4>

      <div id="summaryBox"></div>

    </div>

  </div>

</div>

<!-- bootstrap js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// load cart items in summary
function loadSummary(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let box = document.getElementById("summaryBox");

  box.innerHTML = "";
  let total = 0;

  for(let i=0;i<cart.length;i++){
    total += cart[i].price;

    box.innerHTML += `
      <div class="card p-2 mb-2">
        <h6>${cart[i].name}</h6>
        <p>$${cart[i].price}</p>
      </div>
    `;
  }

  box.innerHTML += "<h5>Total: $" + total + "</h5>";
}

// form validation + payment
function placeOrder(){

  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let payment = document.getElementById("payment").value;

  // validation
  if(name === "" || address === "" || payment === ""){
    alert("Please fill all fields");
    return false;
  }

  // confirmation
  alert("Order placed successfully!");

  // clear cart
  localStorage.removeItem("cart");

  // redirect home
  window.location.href = "index.html";

  return false;
}

// load summary on page open
loadSummary();
</script>

</body>
</html>
