<!-- CART CONTENT -->
<div class="container mt-4">

  <h2>My Cart</h2>

  <!-- items will appear here -->
  <div id="cartBox"></div>

  <!-- back button -->
  <a href="product.html" class="btn btn-secondary mt-3">
    Back to Shop
  </a>

<a href="checkout.html" class="btn btn-success mt-3">
  Go to Checkout
</a>

</div>

<!-- bootstrap js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// get cart from localStorage
function loadCart(){
  let savedCart = JSON.parse(localStorage.getItem("cart")) || [];
  let container = document.getElementById("cartBox");

  container.innerHTML = "";
  let totalPrice = 0;

  // loop through items
  for(let i = 0; i < savedCart.length; i++){

    totalPrice += savedCart[i].price;

    container.innerHTML += `
      <div class="card p-3 mb-2">
        <h5>${savedCart[i].name}</h5>
        <p>Price: $${savedCart[i].price}</p>

        <button onclick="removeFromCart(${i})" 
                class="btn btn-danger btn-sm">
          Remove
        </button>
      </div>
    `;
  }

  // show total
  container.innerHTML += "<h4>Total: $" + totalPrice + "</h4>";
}

// remove item
function removeFromCart(index){
  let savedCart = JSON.parse(localStorage.getItem("cart")) || [];

  savedCart.splice(index, 1);

  localStorage.setItem("cart", JSON.stringify(savedCart));

  loadCart(); 
}


// load cart when page opens
loadCart();
</script>
