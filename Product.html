<div class="container mt-4">

<h2>Cars</h2>

<!-- SEARCH -->
<input id="searchBox" class="form-control mb-3" placeholder="Search cars...">

<!-- FILTER -->
<select id="categoryFilter" class="form-control mb-3">
  <option value="all">All</option>
  <option value="sport">Sport</option>
  <option value="luxury">Luxury</option>
  <option value="super">Super</option>
</select>

<div class="row" id="cars"></div>

</div>

<script>

// cars
let carList = [
  {name:"BMW M4", price:80000, cat:"sport", img:"bmwm4.jpg"},
  {name:"Audi RS7", price:90000, cat:"luxury", img:"audirs7.jpg"},
  {name:"Mercedes AMG GT", price:85000, cat:"sport", img:"mercedesamggt.jpg"},
  {name:"Lamborghini Huracan", price:200000, cat:"super", img:"lamorghinihuracan.jpg"},
  {name:"Ferrari 488", price:220000, cat:"super", img:"ferrari488.jpg"},
  {name:"BMW X5", price:70000, cat:"luxury", img:"bmwx5.jpg"},
  {name:"Audi A7", price:75000, cat:"luxury", img:"audia7.jpg"},
  {name:"Nissan GTR", price:110000, cat:"sport", img:"nissangtr.jpg"},
  {name:"Porsche 911", price:130000, cat:"sport", img:"porche911.jpg"},
  {name:"McLaren 720S", price:300000, cat:"super", img:"mclaren720s.jpg"}
];

let carBox = document.getElementById("cars");

// display cars
function displayCars(list){
  carBox.innerHTML = "";

  for(let i=0;i<list.length;i++){
    carBox.innerHTML += `
      <div class="col-md-4 mb-3">
        <div class="card p-2">

          <!-- CLICK IMAGE -->
          <img src="${list[i].img}" 
               style="width:100%; height:200px; object-fit:cover; cursor:pointer;"
               onclick='openDetails(${JSON.stringify(list[i])})'>

          <h5 class="mt-2">${list[i].name}</h5>
          <p>$${list[i].price}</p>
          <p>${list[i].cat}</p>

          <button onclick='addCart(${JSON.stringify(list[i])})'
          class="btn btn-dark w-100">
            Add to Cart
          </button>

        </div>
      </div>
    `;
  }
}

// open details page
function openDetails(car){
  localStorage.setItem("selectedCar", JSON.stringify(car));
  window.location.href = "product-details.html";
}

// add cart
function addCart(car){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(car);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert(car.name + " added");
}

// filters
function filterCars(){
  let search = document.getElementById("searchBox").value.toLowerCase();
  let category = document.getElementById("categoryFilter").value;

  let filtered = carList.filter(c =>
    c.name.toLowerCase().includes(search) &&
    (category === "all" || c.cat === category)
  );

  displayCars(filtered);
}

// events
document.getElementById("searchBox").addEventListener("keyup", filterCars);
document.getElementById("categoryFilter").addEventListener("change", filterCars);

// load
displayCars(carList);


</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
