<!DOCTYPE html>
<html>
<head>
  <title>Car Details</title>

  <!-- bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <div id="detailsBox"></div>
  <h2>Car Details</h2>

  <!-- where car info shows -->
  <div id="detailsBox"></div>

  <!-- quantity -->
  <input type="number" id="qty" value="1" class="form-control w-25 mt-3">

  <!-- total -->
  <h4 id="total" class="mt-2"></h4>

  <!-- add -->
  <button onclick="addToCart()" class="btn btn-dark mt-2">
    Add to Cart
  </button>

</div>

<script>

// wait for page to load
window.onload = function(){

  let box = document.getElementById("detailsBox");

  // get data safely
  let data = localStorage.getItem("selectedCar");

  if(data){

    let car = JSON.parse(data);

    box.innerHTML = `
      <img src="${car.img}" style="width:300px">
      <h3>${car.name}</h3>
      <p>Price: $${car.price}</p>
      <p>Category: ${car.cat}</p>
    `;

  } else {

    box.innerHTML = "<h4>No car selected</h4>";

  }

};
</script>

</body>
</html>
