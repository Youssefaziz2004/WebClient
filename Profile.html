<div class="container mt-4">

  <h2>My Profile</h2>

  <!-- DISPLAY USER INFO -->
  <div class="card p-3 mb-3">
    <p><strong>Name:</strong> <span id="userName"></span></p>
    <p><strong>Email:</strong> <span id="userEmail"></span></p>
  </div>

  <!-- UPDATE FORM -->
  <h4>Update Info</h4>

  <input id="newName" class="form-control mb-2" placeholder="New Name">
  <input id="newEmail" class="form-control mb-2" placeholder="New Email">

  <button onclick="updateUser()" class="btn btn-primary">
    Save Changes
  </button>

</div>

<script>
// LOAD USER FROM LOCALSTORAGE
function loadUser(){

  // get saved values
  let name = localStorage.getItem("name");
  let email = localStorage.getItem("user");

  // display them
  document.getElementById("userName").innerText = name || "Not set";
  document.getElementById("userEmail").innerText = email || "Not logged in";
}

// UPDATE USER INFO
function updateUser(){

  let newName = document.getElementById("newName").value;
  let newEmail = document.getElementById("newEmail").value;

  if(newName === "" || newEmail === ""){
    alert("Fill all fields");
    return;
  }

  // save to localStorage
  localStorage.setItem("name", newName);
  localStorage.setItem("user", newEmail);

  alert("Profile updated!");

  loadUser(); 
}

// LOAD ON PAGE OPEN
loadUser();
</script>
